# The URL the site will be built for
base_url = "https://www.tokyoscale.com"

# Japanese first; English at /en/...
default_language = "ja"

# Whether to automatically compile all Sass files in the sass directory
compile_sass = true

taxonomies = [
    {name = "categories"},
    {name = "tags", paginate_by = 5, rss = true},
    {name = "authors", rss = true},
]

[languages.en]
taxonomies = [
    {name = "categories"},
    {name = "tags", paginate_by = 5, rss = true},
    {name = "authors", rss = true},
]

# Syntax highlighting (Zola 0.22+ / Giallo)
[markdown.highlighting]
theme = "github-light"

[extra]
# TokyoScale office (Edogawa-ku, Tokyo)
address_ja = "〒132-0025 東京都江戸川区松江5-21-2 802"
address_en = "802, 5-21-2 Matsue, Edogawa-ku, Tokyo 132-0025, Japan"
phone = "080-1320-6699"
phone_tel = "+818013206699"
