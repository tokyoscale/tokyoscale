# Deploy built site to gh-pages branch (GitHub Pages).
# Requires: Settings → Actions → General → Workflow permissions → Read and write (or use permissive defaults with `permissions` below).
on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build only (no deploy)
        uses: shalzz/zola-deploy-action@v0.22.1
        env:
          BUILD_DIR: .
          TOKEN: ${{ github.token }}
          BUILD_ONLY: true

  build_and_deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build and deploy
        uses: shalzz/zola-deploy-action@v0.22.1
        env:
          PAGES_BRANCH: gh-pages
          BUILD_DIR: .
          TOKEN: ${{ github.token }}
